<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock paper scissor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
</head>
<body class="bg-gray-100">
    <audio id="sound"><source src="soundeffect.mp3"></audio>
    <div class="flex justify-center items-center bg-indigo-400 h-[65px] mb-8 border-[1px] border-stone-900 shadow-md">
        <h1 class="text-xl font-bold text-white"> ⋆˙⟡ ⋆. ROCK PAPER SCISSOR .⋆ ⟡˙⋆</h1>
    </div>
    <div class="choices grid grid-cols-3 gap-6">
        <div id="rock" class="choice  ml-6 h-[330px] border-2 border-stone-900 rounded-2xl hover:cursor-pointer hover:scale-105 hover:shadow-md transition-transform">
            <img src="Image_rock4.png" class="object-cover w-full h-full rounded-2xl">
        </div>
        <div id="paper" class="choice h-[330px] border-2 border-stone-900 rounded-2xl hover:cursor-pointer hover:scale-105 hover:shadow-md transition-transform">
            <img src="Image_paper3.png" class="object-cover w-full h-full rounded-2xl" >
        </div>
        <div id="scissor" class="choice mr-6 h-[330px] border-2 border-stone-900 rounded-2xl hover:cursor-pointer hover:scale-105 hover:shadow-md transition-transform">
            <img src="Image_scissor3.png" class="object-cover w-full h-full rounded-2xl">
        </div>
    </div>

    <div id="comment" class=" flex justify-center items-center mt-6 h-10 bg-indigo-300 border-[1px] shadow-md border-stone-900">
        PLAY YOUR MOVE
    </div>

    <div class="flex  justify-center gap-2 ">
        <div class="flex flex-col justify-center items-center">
            <div class="flex justify-center items-center h-10 w-60 p-4 bg-indigo-300 mt-3 border-[1px] border-stone-900 rounded-xl shadow-md">
                <div>PLAYER</div>
            </div>
            <div id="playerScoreCount" class="flex justify-center items-center h-10 w-24 bg-indigo-300 mt-3 border-[1px] border-stone-900 rounded-xl shadow-md">
                <span>0</span>
            </div>
        </div>
        <div class="flex flex-col justify-center items-center">
            <div class="flex justify-center items-center h-10 w-64 p-4 bg-indigo-300 mt-3 border-[1px] border-stone-900 rounded-xl shadow-md">
                <div>COMPUTER</div>
            </div>
            <div id="compScoreCount" class="flex justify-center items-center h-10 w-24 bg-indigo-300 mt-3 border-[1px] border-stone-900 rounded-xl shadow-md">
                <span>0</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>

</body>
